<!DOCTYPE html>
<html>

<head>

<title>Admin Login</title>

<link rel="stylesheet" href="login.css">

</head>

<body>

<div class="login-box">

<h2>Mini CRM Login</h2>

<form id="loginForm">

<input
type="text"
id="username"
placeholder="Username"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<button type="submit">

Login

</button>

<p id="error"></p>

</form>

</div>

<script src="login.js"></script>

</body>

</html>
